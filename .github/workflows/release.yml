name: Build PyCalc for Windows, macOS & Linux

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: |
          poetry run pyinstaller --onefile src/pycalc/main.py --name pycalc

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: pycalc-${{ matrix.os }}
          path: dist/*
